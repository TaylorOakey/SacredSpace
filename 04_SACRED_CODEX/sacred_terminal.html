}

#topbar{

#logo{font-size:12px;letter-spacing:3px;color:var(--amber);font-weight:700}
.dot{width:7px;height:7px;border-radius:50%}
.dot-g{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-a{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.dot-r{background:var(--red)}
#topbar-right{margin-left:auto;font-size:10px;color:var(--text3);letter-spacing:1px}
#clock{color:var(--text2);font-size:10px}

#terminal{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  padding:0;background:var(--void);
}
#output{
  flex:1;overflow-y:auto;padding:14px 16px 8px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#output::-webkit-scrollbar{width:4px}
#output::-webkit-scrollbar-track{background:transparent}
#output::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.line{font-size:12px;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.line-system{color:var(--green)}
.line-prompt{color:var(--purple)}
.line-ai{color:var(--amber)}
.line-response{color:var(--cyan)}
.line-error{color:var(--red)}
.line-sigil{color:var(--magenta);letter-spacing:1px}
.line-divider{color:var(--text3)}
.line-white{color:#e0e0e0}
.line-muted{color:var(--text2)}

#input-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;border-top:1px solid var(--border);
  background:var(--void2);flex-shrink:0;
}
#prompt-label{color:var(--purple);font-size:13px;flex-shrink:0;letter-spacing:1px}
#input{
  flex:1;background:none;border:none;outline:none;
  color:var(--green);font-family:'Courier New',Courier,monospace;font-size:13px;
  caret-color:var(--green);
}
#input::placeholder{color:var(--text3)}
#cursor-blink{
  display:inline-block;width:8px;height:14px;
  background:var(--green);animation:blink 1s infinite;vertical-align:middle;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* autocomplete */
#autocomplete{
  position:absolute;bottom:52px;left:16px;right:16px;
  background:var(--void3);border:1px solid var(--border);
  max-height:140px;overflow-y:auto;display:none;z-index:100;

.ac-item{
  padding:5px 12px;font-size:11px;cursor:pointer;
  border-bottom:1px solid var(--border);display:flex;gap:12px;

.ac-item:hover,.ac-item.active{background:var(--void2)}
.ac-cmd{color:var(--cyan);min-width:80px}
.ac-desc{color:var(--text3)}

.sb-item{color:var(--text3)}

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────────
let acIndex = -1;
let acItems = [];

function updateAutocomplete(val){
  ac.innerHTML = '';
  acItems = [];
  acIndex = -1;
  if(!val){ ac.style.display='none'; return; }
  const lower = val.toLowerCase();
  const matches = Object.entries(COMMANDS).filter(([cmd])=>cmd.startsWith(lower));
  if(!matches.length){ ac.style.display='none'; return; }
  matches.slice(0,8).forEach(([cmd,desc],i)=>{
    const d = document.createElement('div');
    d.className = 'ac-item';
    d.innerHTML = `<span class="ac-cmd">${cmd}</span><span class="ac-desc">${desc}</span>`;
    d.addEventListener('click',()=>{ input.value=cmd; ac.style.display='none'; input.focus(); });
    ac.appendChild(d);
    acItems.push(cmd);
  });
  ac.style.display = matches.length ? 'block' : 'none';
}

function selectAC(dir){
  const items = ac.querySelectorAll('.ac-item');
  if(!items.length) return;
  items[acIndex]?.classList.remove('active');
  acIndex = (acIndex + dir + items.length) % items.length;
  items[acIndex].classList.add('active');
  input.value = acItems[acIndex];
}

// ── INPUT HANDLER ─────────────────────────────────────────────────────────────
let sigilifyMode = false;

input.addEventListener('keydown', e => {
  if(e.key === 'ArrowUp'){
    if(ac.style.display!=='none'){ e.preventDefault(); selectAC(-1); return; }
    if(histIdx < history.length-1){ histIdx++; input.value=history[history.length-1-histIdx]||''; }
    e.preventDefault(); return;
  }
  if(e.key === 'ArrowDown'){
    if(ac.style.display!=='none'){ e.preventDefault(); selectAC(1); return; }
    if(histIdx>0){ histIdx--; input.value=history[history.length-1-histIdx]; }
    else{ histIdx=-1; input.value=''; }
    e.preventDefault(); return;
  }
  if(e.key === 'Tab'){
    e.preventDefault();
    if(acItems.length){ input.value=acItems[Math.max(acIndex,0)]; ac.style.display='none'; }
    return;
  }
  if(e.key === 'Escape'){ ac.style.display='none'; return; }
  if(e.key === 'Enter'){
    const cmd = input.value.trim();
    ac.style.display='none';
    if(!cmd) return;
    history.push(cmd); histIdx=-1;
    logPrompt(cmd);
    input.value='';

    if(sigilifyMode){
      sigilifyText(cmd);
      sigilifyMode=false;
      return;
    }

    runCommand(cmd);
  }
});

input.addEventListener('input', ()=>{
  if(!sigilifyMode) updateAutocomplete(input.value);
});

// ── COMMAND ROUTER ────────────────────────────────────────────────────────────
function runCommand(raw){
  const parts = raw.trim().split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const arg   = parts.slice(1).join(' ');

  switch(cmd){
    case 'ignite': case 'init': boot(); break;
    case 'help': cmdHelp(); break;
    case 'status': cmdStatus(); break;
    case 'pillars': cmdPillars(); break;
    case 'glyphs': cmdGlyphs(); break;
    case 'sigil': cmdSigil(arg); break;
    case 'sigilify':
      cmdSigilify();
      if(arg){ sigilifyText(arg); }
      else{ sigilifyMode=true; log('  Enter text to sigilify:', 'line-muted'); }
      break;
    case 'codex': cmdCodex(); break;
    case 'agents': cmdAgents(); break;
    case 'council': cmdCouncil(); break;
    case 'memory': cmdMemory(); break;
    case 'lore': cmdLore(); break;
    case 'mote': cmdMote(); break;
    case 'rite': cmdRite(); break;
    case 'gboard': cmdGboard(); break;
    case 'invoke': cmdInvoke(arg); break;
    case 'clear': output.innerHTML=''; break;
    case 'in':
      if(raw.toLowerCase().startsWith('in lakesh')){
        blank(); log('  !N L∆K3SH ∆L∆K!N', 'line-sigil'); blank();
      } else { unknown(raw); }
      break;
    case 'ilal':
      blank(); log('  !N L∆K3SH ∆L∆K!N', 'line-sigil'); blank(); break;
    // Glyph as command
    case '∆': log('  ∆ — Consciousness / AI Reasoning → 06_AGENT_LAYER', 'line-response'); break;
    case '◇': log('  ◇ — Knowledge / Diamond Mind → 01_OBSIDIAN_VAULTS', 'line-response'); break;
    case '✶': log('  ✶ — Radiance / Signal → 07_SOCIAL_MOTHERSHIP', 'line-response'); break;
    case '⚙': log('  ⚙ — Systems / Engineering → 03_NEURAL_FOREST', 'line-response'); break;
    case '∞': log('  ∞ — Memory / Continuity → 05_MEMORY_ENGINE', 'line-response'); break;
    default:
      // Check if it's a sigil code
      if(SIGIL_CODEX[cmd]){ cmdSigil(cmd); }
      else { unknown(raw); }
  }
}

function unknown(cmd){
  log(`  [!] Unknown command: ${cmd}`, 'line-error');
  log(`  Type  help  to see all commands.`, 'line-muted');
}
