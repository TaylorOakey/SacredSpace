name: Repo Sanity

on:
  pull_request:
  workflow_dispatch:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required paths
        run: |
          test -d docs/canon
          test -d docs/governance
          test -d agents
          test -d templates
          echo "Required paths present."
